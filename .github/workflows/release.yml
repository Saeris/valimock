name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

# id-token must be at the workflow level for OIDC trusted publishing.
# Job-level permissions blocks replace (not merge) workflow-level ones, which
# can cause workflow_dispatch triggers to silently lose id-token access.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  changes:
    name: Detect Changes
    if: github.repository == 'Saeris/valimock'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.result.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            version:
              - 'package.json'
      - id: result
        run: echo "version=${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.version }}" >> $GITHUB_OUTPUT

  bump:
    name: Bump
    needs: [changes]
    if: needs.changes.outputs.version == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "lts"
          cache: true

      - run: vp dlx @varlock/bumpy ci plan
        env:
          GH_TOKEN: ${{ github.token }}

      - run: vp dlx @varlock/bumpy ci release
        env:
          GH_TOKEN: ${{ github.token }}
          BUMPY_GH_TOKEN: ${{ secrets.BUMPY_GH_TOKEN }}
          # Yarn 4 corrupts the tarball path Bumpy captures from stdout if
          # color codes are enabled. NO_COLOR alone is not enough for Yarn 4.
          NO_COLOR: "1"
          YARN_ENABLE_COLORS: "false"

  publish:
    name: Publish
    needs: [changes]
    if: needs.changes.outputs.version == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "lts"
          cache: true
          registry-url: "https://registry.npmjs.org"

      - run: vp pack

      - run: vp dlx @varlock/bumpy ci release
        env:
          GH_TOKEN: ${{ github.token }}
          BUMPY_GH_TOKEN: ${{ secrets.BUMPY_GH_TOKEN }}
          NO_COLOR: "1"
          YARN_ENABLE_COLORS: "false"
