name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Check & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Active LTS and Current track the Node release calendar automatically.
        # Previous LTS is pinned; bump it once per year when a new even-numbered
        # Node major reaches LTS status.
        node-version: ["22", "lts", "latest"]
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ matrix.node-version }}
          cache: true

      - run: vp check
      - run: vp test
